const scrollTopBtn = document.getElementById('scrollTopBtn');

  scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
}


// Robust Up button: scroll both window and scrollable containers
function smoothScrollToTop(el) {
  try {
    if (!el) return;
    if ('scrollTo' in el) el.scrollTo({ top: 0, behavior: 'smooth' });
    else el.scrollTop = 0;
  } catch {}
}
const upBtn = document.getElementById('scrollTopBtn');
if (upBtn) {
  upBtn.addEventListener('click', (e) => {
    e.preventDefault();
    const editor = document.getElementById('editor');
    const main = document.querySelector('.main');
    smoothScrollToTop(window);
    smoothScrollToTop(document.documentElement);
    smoothScrollToTop(document.body);
    smoothScrollToTop(main);
    smoothScrollToTop(editor);
  });
}
// Improve overall smooth scrolling UX
try { document.documentElement.style.scrollBehavior = 'smooth'; } catch {}


// Ensure Format toggles the fixed toolbar visibility

  if (!toolbarEl) return;

// DOM-ready binding for Top button
(function(){

// === Editable workspace name synced with header title ===
(function(){
  const appTitle = document.getElementById('appTitle');
  const wsTitle = document.getElementById('workspaceTitle');
  const LS_KEY = 'workspace_name_current';

  function setTitles(t){
    if (appTitle && typeof t === 'string') appTitle.textContent = t;
    if (wsTitle && typeof t === 'string') wsTitle.textContent = t;
    try { document.title = t ? (t + ' — RamNotes') : 'RamNotes'; } catch {}
  }

  // Load saved name
  try {
    const saved = localStorage.getItem(LS_KEY);
    if (saved && saved.trim()) setTitles(saved.trim());
  } catch {}

  function save(val){
    try { localStorage.setItem(LS_KEY, val); } catch {}
  }

  function normalize(s){
    return (s || '').replace(/\s+/g,' ').trim();
  }

  function bindEditable(el){
    if (!el) return;
    el.addEventListener('keydown', (e)=>{
      if (e.key === 'Enter'){ e.preventDefault(); el.blur(); }
    });
    el.addEventListener('input', ()=>{
      const v = normalize(el.textContent);
      setTitles(v);
    });
    el.addEventListener('blur', ()=>{
      const v = normalize(el.textContent);
      setTitles(v);
      save(v);
    });
  }

  bindEditable(appTitle);
  bindEditable(wsTitle);
})();

function summarize(text,{mode='medium', customUnits='percent', customAmount=35}={}){
  const stop = new Set(("a about above after again against all am an and any are aren't as at be because been before being below "+
  "between both but by can't cannot could couldn't did didn't do does doesn't doing don't down during each few for from further had "+

  "if in into is isn't it it's its itself let's me more most mustn't my myself no nor not of off on once only or other ought our ours "+
  "ourselves out over own same shan't she she'd she'll she's should shouldn't so some such than that that's the their theirs them "+
  "themselves then there there's these they they'd they'll they're they've this those through to too under until up very was wasn't we "+
  "we'd we'll we're we've were weren't what what's when when's where where's which while who who's whom why why's with won't would "+
  "wouldn't you you'd you'll you're you've your yours yourself yourselves").split(/\s+/));

    return {i, s, v:(score/len)*posBoost};

    keep = Math.max(1, Math.round(sentences.length * (mode==='short'?0.2:mode==='long'?0.5:0.35)));

    if(customUnits==='percent'){
